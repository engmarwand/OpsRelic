<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Plan</title>
    <script async defer src="https://js.whop.com/static/checkout/loader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap');
        
        :root {
            --bg: #080c10;
            --card-bg: #111820;
            --text-main: #e8edf4;
            --text-muted: #7a8fa6;
            --accent: #00d4e8;
            --accent-dim: rgba(0,212,232,0.1);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 4rem;
            letter-spacing: -0.05em;
        }

        .pricing-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 2.5rem;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(0,212,232,0.1);
        }

        .card.pro {
            border: 1px solid var(--accent);
            background: linear-gradient(180deg, #111820 0%, #151d28 100%);
        }
        
        .card.pro::before {
            content: "OPERATOR PREFERRED";
            position: absolute;
            top: 20px;
            right: -35px;
            transform: rotate(45deg);
            background: var(--accent);
            color: #001f26;
            padding: 0.5rem 3rem;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.1em;
        }

        h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0;
            color: var(--accent);
        }

        .price { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem; 
            font-weight: 900; 
            margin: 1.5rem 0; 
            letter-spacing: -0.05em;
        }
        
        .price span {
            font-size: 1rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
            letter-spacing: 0;
        }

        ul { list-style: none; padding: 0; margin-bottom: 3rem; flex-grow: 1; }
        li { margin-bottom: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.95rem; }
        li::before { content: "→"; color: var(--accent); margin-right: 0.75rem; font-weight: 900; }

        .btn {
            background: var(--accent);
            color: #001f26;
            padding: 1.25rem;
            border: none;
            border-radius: 1.25rem;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.9rem;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.2s;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Modal */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 2.5rem;
            max-width: 550px;
            width: 90%;
            border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <h1>Choose Your Plan</h1>

    <div class="pricing-container">
        <div class="card">
            <h3>Starter</h3>
            <div class="price">$0</div>
            <ul><li>CSV Upload</li><li>Campaign Reports</li></ul>
            <button class="btn" onclick="openCheckout('free')">Get Started</button>
        </div>
        <div class="card pro">
            <h3>Pro</h3>
            <div class="price">$47</div>
            <ul><li>Everything in Starter</li><li>AI Insights</li></ul>
            <button class="btn" onclick="openCheckout('plan_3abAVC0tgumce')">Get Started</button>
        </div>
        <div class="card">
            <h3>Agency</h3>
            <div class="price">$247</div>
            <ul><li>Everything in Pro</li><li>Custom Domains</li><li>Report Reordering</li></ul>
            <button class="btn" onclick="openCheckout('plan_5bnzRrzNEhrt7')">Get Started</button>
        </div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="whop-container"></div>
            <button class="btn" style="width: 100%; margin-top: 1rem;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function openCheckout(planId) {
            const container = document.getElementById('whop-container');
            container.innerHTML = `<div data-whop-checkout-plan-id="${planId}" data-whop-checkout-theme="dark"></div>`;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
